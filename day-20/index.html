<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 20 - Habit Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 6px;
      color: #58a6ff;
    }

    p.subtitle {
      color: #8b949e;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .input-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 28px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #e6edf3;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus {
      border-color: #58a6ff;
    }

    button.add-btn {
      padding: 10px 18px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.2s;
    }

    button.add-btn:hover { background: #2ea043; }

    .habits {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .habit-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .habit-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .check-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #30363d;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .check-btn.done {
      background: #238636;
      border-color: #238636;
      color: white;
    }

    .habit-name {
      font-size: 0.95rem;
      flex: 1;
    }

    .habit-name.done {
      text-decoration: line-through;
      color: #8b949e;
    }

    .streak-badge {
      font-size: 0.78rem;
      color: #f0883e;
      background: rgba(240,136,62,0.12);
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #6e7681;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      transition: color 0.2s;
    }

    .delete-btn:hover { color: #f85149; }

    .progress-bar-wrap {
      width: 100%;
      max-width: 480px;
      margin-bottom: 24px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #8b949e;
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 6px;
      background: #21262d;
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #238636;
      border-radius: 6px;
      transition: width 0.3s ease;
    }

    .date-label {
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>Daily Habit Tracker</h1>
  <p class="subtitle">100 Days of Code — Day 20</p>
  <p class="date-label" id="dateLabel"></p>

  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Today's Progress</span>
      <span id="progressText">0 / 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <div class="input-row">
    <input type="text" id="habitInput" placeholder="Add a new habit..." />
    <button class="add-btn" onclick="addHabit()">Add</button>
  </div>

  <div class="habits" id="habitList"></div>

  <script>
    const TODAY = new Date().toDateString();

    function getState() {
      return JSON.parse(localStorage.getItem('habits_v1') || '[]');
    }

    function saveState(state) {
      localStorage.setItem('habits_v1', JSON.stringify(state));
    }

    function addHabit() {
      const input = document.getElementById('habitInput');
      const name = input.value.trim();
      if (!name) return;

      const state = getState();
      state.push({ id: Date.now(), name, streak: 0, lastDone: null, doneToday: false });
      saveState(state);
      input.value = '';
      render();
    }

    function toggleHabit(id) {
      const state = getState();
      const habit = state.find(h => h.id === id);
      if (!habit) return;

      if (!habit.doneToday) {
        habit.doneToday = true;
        if (habit.lastDone !== TODAY) {
          habit.streak += 1;
          habit.lastDone = TODAY;
        }
      } else {
        habit.doneToday = false;
        habit.streak = Math.max(0, habit.streak - 1);
      }
      saveState(state);
      render();
    }

    function deleteHabit(id) {
      const state = getState().filter(h => h.id !== id);
      saveState(state);
      render();
    }

    function render() {
      const state = getState();
      const list = document.getElementById('habitList');
      const done = state.filter(h => h.doneToday).length;

      document.getElementById('progressText').textContent = `${done} / ${state.length}`;
      const pct = state.length ? (done / state.length) * 100 : 0;
      document.getElementById('progressFill').style.width = pct + '%';

      list.innerHTML = '';
      state.forEach(habit => {
        const card = document.createElement('div');
        card.className = 'habit-card';
        card.innerHTML = `
          <div class="habit-left">
            <button class="check-btn ${habit.doneToday ? 'done' : ''}" onclick="toggleHabit(${habit.id})">
              ${habit.doneToday ? '✓' : ''}
            </button>
            <span class="habit-name ${habit.doneToday ? 'done' : ''}">${habit.name}</span>
          </div>
          ${habit.streak > 0 ? `<span class="streak-badge">🔥 ${habit.streak} day${habit.streak > 1 ? 's' : ''}</span>` : ''}
          <button class="delete-btn" onclick="deleteHabit(${habit.id})">✕</button>
        `;
        list.appendChild(card);
      });
    }

    document.getElementById('habitInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addHabit();
    });

    document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-CA', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    render();
  </script>
</body>
</html>
