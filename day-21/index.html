<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 21 - Habit Heatmap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.8rem;
      color: #58a6ff;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #8b949e;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 36px;
      width: 100%;
      max-width: 560px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #e6edf3;
      font-size: 0.95rem;
      outline: none;
    }

    input[type="text"]:focus { border-color: #58a6ff; }

    button.add-btn {
      padding: 10px 18px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
    }

    button.add-btn:hover { background: #2ea043; }

    .habits-container {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .habit-block {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
    }

    .habit-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .habit-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .habit-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .check-today-btn {
      padding: 5px 14px;
      border-radius: 6px;
      border: none;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .check-today-btn.done {
      background: #238636;
      color: white;
    }

    .check-today-btn.not-done {
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #6e7681;
      cursor: pointer;
      font-size: 1rem;
    }

    .delete-btn:hover { color: #f85149; }

    .heatmap {
      display: grid;
      grid-template-columns: repeat(30, 1fr);
      gap: 3px;
    }

    .heatmap-cell {
      aspect-ratio: 1;
      border-radius: 2px;
      background: #21262d;
      cursor: default;
      position: relative;
    }

    .heatmap-cell.done { background: #238636; }
    .heatmap-cell.today { outline: 2px solid #58a6ff; outline-offset: 1px; }

    .heatmap-cell:hover::after {
      content: attr(data-date);
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: #1c2128;
      border: 1px solid #30363d;
      color: #e6edf3;
      font-size: 0.7rem;
      padding: 3px 6px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }

    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 12px;
    }

    .stat {
      font-size: 0.8rem;
      color: #8b949e;
    }

    .stat span {
      color: #e6edf3;
      font-weight: 600;
    }

    .heatmap-label {
      font-size: 0.75rem;
      color: #6e7681;
      margin-bottom: 6px;
    }

    .empty-state {
      text-align: center;
      color: #8b949e;
      padding: 40px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>Habit Heatmap</h1>
  <p class="subtitle">100 Days of Code — Day 21 | Last 30 days at a glance</p>

  <div class="input-row">
    <input type="text" id="habitInput" placeholder="Add a habit to track..." />
    <button class="add-btn" onclick="addHabit()">Add Habit</button>
  </div>

  <div class="habits-container" id="habitList">
    <div class="empty-state">No habits yet. Add one above to get started.</div>
  </div>

  <script>
    const STORAGE_KEY = 'heatmap_habits_v1';

    function getLast30Days() {
      const days = [];
      const today = new Date();
      for (let i = 29; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        days.push(d.toDateString());
      }
      return days;
    }

    function getState() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function addHabit() {
      const input = document.getElementById('habitInput');
      const name = input.value.trim();
      if (!name) return;
      const state = getState();
      state.push({ id: Date.now(), name, completedDays: [] });
      saveState(state);
      input.value = '';
      render();
    }

    function toggleToday(id) {
      const state = getState();
      const habit = state.find(h => h.id === id);
      if (!habit) return;
      const today = new Date().toDateString();
      const idx = habit.completedDays.indexOf(today);
      if (idx === -1) {
        habit.completedDays.push(today);
      } else {
        habit.completedDays.splice(idx, 1);
      }
      saveState(state);
      render();
    }

    function deleteHabit(id) {
      const state = getState().filter(h => h.id !== id);
      saveState(state);
      render();
    }

    function render() {
      const state = getState();
      const list = document.getElementById('habitList');
      const days = getLast30Days();
      const today = new Date().toDateString();

      if (state.length === 0) {
        list.innerHTML = '<div class="empty-state">No habits yet. Add one above to get started.</div>';
        return;
      }

      list.innerHTML = '';

      state.forEach(habit => {
        const doneToday = habit.completedDays.includes(today);
        const totalDone = habit.completedDays.filter(d => days.includes(d)).length;

        // Calculate current streak
        let streak = 0;
        const check = new Date();
        while (true) {
          const ds = check.toDateString();
          if (habit.completedDays.includes(ds)) {
            streak++;
            check.setDate(check.getDate() - 1);
          } else break;
        }

        const block = document.createElement('div');
        block.className = 'habit-block';

        const heatmapCells = days.map(d => {
          const done = habit.completedDays.includes(d);
          const isToday = d === today;
          const label = new Date(d).toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
          return `<div class="heatmap-cell ${done ? 'done' : ''} ${isToday ? 'today' : ''}" data-date="${label}"></div>`;
        }).join('');

        block.innerHTML = `
          <div class="habit-header">
            <span class="habit-name">${habit.name}</span>
            <div class="habit-actions">
              <button class="check-today-btn ${doneToday ? 'done' : 'not-done'}" onclick="toggleToday(${habit.id})">
                ${doneToday ? '✓ Done today' : 'Mark done'}
              </button>
              <button class="delete-btn" onclick="deleteHabit(${habit.id})">✕</button>
            </div>
          </div>
          <p class="heatmap-label">Last 30 days</p>
          <div class="heatmap">${heatmapCells}</div>
          <div class="stats-row">
            <div class="stat">Completed (30d): <span>${totalDone}</span></div>
            <div class="stat">Current streak: <span>${streak} day${streak !== 1 ? 's' : ''}</span></div>
            <div class="stat">Completion rate: <span>${Math.round((totalDone / 30) * 100)}%</span></div>
          </div>
        `;

        list.appendChild(block);
      });
    }

    document.getElementById('habitInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addHabit();
    });

    render();
  </script>
</body>
</html>
